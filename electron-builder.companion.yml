appId: com.roie.deck-threads
productName: Deck Threads
artifactName: "Deck-Threads-${version}-${arch}.${ext}"
asar: true
npmRebuild: false
forceCodeSigning: true
electronUpdaterCompatibility: ">=2.16"

publish:
  - provider: github
    owner: rschwabco
    repo: deck-threads

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: build/icon.png
    to: icon.png
  - from: build/trayTemplate.png
    to: trayTemplate.png
  - from: build/trayTemplate@2x.png
    to: trayTemplate@2x.png

directories:
  buildResources: build
  output: release-companion-1.0.1

mac:
  category: public.app-category.utilities
  minimumSystemVersion: "13.0"
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: false

dmg:
  sign: false
  background: build/dmg-background.png
  iconSize: 112
  iconTextSize: 13
  contents:
    - x: 150
      y: 244
    - x: 510
      y: 244
      type: link
      path: /Applications
