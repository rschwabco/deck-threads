appId: com.roie.deck-threads
productName: Deck Threads
artifactName: "Deck-Threads-${version}-${arch}.${ext}"
asar: true
npmRebuild: false
forceCodeSigning: true
electronUpdaterCompatibility: ">=2.16"

publish:
  - provider: github
    owner: rschwabco
    repo: deck-threads

files:
  - dist/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: build/icon.png
    to: icon.png
  - from: build/trayTemplate.png
    to: trayTemplate.png
  - from: build/trayTemplate@2x.png
    to: trayTemplate@2x.png
  - from: stream-deck/com.roie.deck-threads.sdPlugin
    to: stream-deck-plugin/com.roie.deck-threads.sdPlugin

directories:
  buildResources: build
  output: release-production

mac:
  category: public.app-category.utilities
  minimumSystemVersion: "13.0"
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true

dmg:
  sign: false
  background: build/dmg-background.png
  iconSize: 112
  iconTextSize: 13
  contents:
    - x: 150
      y: 244
    - x: 510
      y: 244
      type: link
      path: /Applications
