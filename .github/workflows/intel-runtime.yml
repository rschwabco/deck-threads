name: Intel runtime acceptance

on:
  pull_request:
    paths:
      - ".github/workflows/intel-runtime.yml"
      - "electron/**"
      - "scripts/smoke-electron-runtime.cjs"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  intel-runtime:
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Require an Intel host
        run: test "$(uname -m)" = "x86_64"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Exercise the Electron runtime
        run: npm run test:runtime-smoke
