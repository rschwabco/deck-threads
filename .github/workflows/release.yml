name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            stream-deck/package-lock.json

      - name: Require tag to match application version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          app_version="$(node -p "require('./package.json').version")"
          expected_tag="v$app_version"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Release tag $GITHUB_REF_NAME must match package version $expected_tag." >&2
            exit 1
          fi

      - name: Require signing and notarization secrets
        env:
          APP_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12_BASE64 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          for variable in APP_CERTIFICATE APP_CERTIFICATE_PASSWORD INSTALLER_CERTIFICATE INSTALLER_CERTIFICATE_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!variable:-}" ]]; then
              echo "Missing required secret for $variable" >&2
              exit 1
            fi
          done

      - name: Import app and installer signing certificates
        env:
          APP_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_P12_BASE64 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          keychain_path="$RUNNER_TEMP/deck-threads-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          app_certificate_path="$RUNNER_TEMP/deck-threads-app.p12"
          installer_certificate_path="$RUNNER_TEMP/deck-threads-installer.p12"
          printf '%s' "$APP_CERTIFICATE" | base64 --decode > "$app_certificate_path"
          printf '%s' "$INSTALLER_CERTIFICATE" | base64 --decode > "$installer_certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$app_certificate_path" -k "$keychain_path" -P "$APP_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security import "$installer_certificate_path" -k "$keychain_path" -P "$INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/pkgbuild -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          installer_identity="$(security find-identity -v -p basic "$keychain_path" | sed -n 's/^[[:space:]]*[0-9][0-9]*) [0-9A-F]* "\(Developer ID Installer:.*\)"$/\1/p' | head -1)"
          if [[ -z "$installer_identity" ]]; then
            echo "The imported keychain does not contain a Developer ID Installer identity." >&2
            exit 1
          fi
          echo "DECK_THREADS_INSTALLER_IDENTITY=$installer_identity" >> "$GITHUB_ENV"
          echo "DECK_THREADS_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
          rm -f "$app_certificate_path" "$installer_certificate_path"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix stream-deck ci

      - name: Test and package plugin
        run: |
          npm run test:updater
          npm run test:update-metadata
          npm run test:bundled-plugin
          npm run test:installer-postinstall
          npm run test:state
          npm run release:verify-plugin-version
          npm run streamdeck:pack
          npm run streamdeck:validate

      - name: Build signed and notarized universal app
        run: npm run release:mac

      - name: Build, sign, and notarize installers
        run: |
          npm run release:installers
          npm run release:notarize-installers

      - name: Verify and collect artifacts
        run: |
          npm run release:verify
          npm run release:verify-installers
          npm run release:submission

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deck-threads-${{ github.ref_name }}
          path: release-submission/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          prerelease=false
          if [[ "$release_version" == *-* ]]; then
            prerelease=true
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq .isDraft)"
            if [[ "$is_draft" != "true" ]]; then
              echo "Release ${GITHUB_REF_NAME} is already published. Publish a higher version instead of replacing updater assets." >&2
              exit 1
            fi
          else
            gh release create "${GITHUB_REF_NAME}" --verify-tag --draft --title "Deck Threads $release_version" --notes-file CHANGELOG.md
          fi

          gh release upload "${GITHUB_REF_NAME}" release-submission/* --clobber

          expected_assets="$(find release-submission -maxdepth 1 -type f -exec basename {} \; | sort)"
          actual_assets="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | sort)"
          if [[ "$actual_assets" != "$expected_assets" ]]; then
            echo "Draft release assets do not match the verified submission set." >&2
            diff -u <(printf '%s\n' "$expected_assets") <(printf '%s\n' "$actual_assets") || true
            exit 1
          fi

          if [[ "$prerelease" == "true" ]]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease --title "Deck Threads $release_version" --notes-file CHANGELOG.md
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease=false --latest --title "Deck Threads $release_version" --notes-file CHANGELOG.md
          fi
